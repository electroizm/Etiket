{% extends "base.html" %}
{% block title %}Kayıt — Etiket Sistemi{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Ücretsiz Deneyin</h1>
        <p class="auth-subtitle">14 gün boyunca tüm özellikler açık</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/register" class="form">
            <div class="form-group">
                <label for="bayii_adi">Bayii Adı</label>
                <input type="text" id="bayii_adi" name="bayii_adi" required
                       placeholder="Güneşler Mobilya" autofocus>
            </div>
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" required
                       placeholder="bayii@email.com">
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" required
                       placeholder="En az 8 karakter" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Kayıt Ol</button>
        </form>

        <p class="auth-footer">
            Zaten hesabınız var mı? <a href="/auth/login">Giriş yapın</a>
        </p>
    </div>
</div>
{% endblock %}
