name: Debug Price Test

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 lxml aiohttp supabase pydantic-settings python-dotenv
      - name: TR header testi
        run: |
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup

          url = "https://www.dogtas.com/piero-sandalye-kadife-dokulu-krem-3120012493"

          import re
          r2 = requests.get(url, headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0"}, timeout=20)

          # advancedBundleSummary objesini bul
          m = re.search(r'advancedBundleSummary\s*=\s*(\{[^;]{0,500}\})', r2.text)
          if m:
              print("advancedBundleSummary:", m.group(1)[:300])
          else:
              print("advancedBundleSummary: YOK")

          # discountPrice sayisal deger
          matches = re.findall(r'discountPrice["\s:]+([0-9,.]+)', r2.text)
          print("discountPrice degerleri:", matches[:5])

          # dataLayer tam icerik
          dl = re.findall(r'dataLayer\.push\((\{.{0,800}\})\)', r2.text, re.DOTALL)
          for d in dl[:3]:
              if 'price' in d.lower():
                  print("dataLayer:", d[:400])

          # Farklı header kombinasyonlarını test et
          test_cases = [
              ("Sadece UA", {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0",
              }),
              ("TR Cookie", {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0",
                  "Accept-Language": "tr-TR,tr;q=0.9",
                  "Cookie": "language=tr; country=TR",
              }),
              ("X-Forwarded-For TR IP", {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0",
                  "Accept-Language": "tr-TR,tr;q=0.9",
                  "Cookie": "language=tr; country=TR",
                  "X-Forwarded-For": "78.185.100.1",
                  "CF-IPCountry": "TR",
              }),
              ("Session cookie oncesi", None),  # Önce ana sayfadan cookie al
          ]

          for name, headers in test_cases:
              if headers is None:
                  # Ana sayfadan gerçek cookie al
                  s = requests.Session()
                  s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0", "Accept-Language": "tr-TR,tr;q=0.9"})
                  s.get("https://www.dogtas.com/", timeout=15)
                  r = s.get(url, timeout=20)
              else:
                  r = requests.get(url, headers=headers, timeout=20)

              soup = BeautifulSoup(r.text, "html.parser")
              el = soup.select_one(".discount-price, .new-sale-price")
              ppg = soup.select_one(".product-price-group")
              print(f"[{name}] discount-price: {el.get_text(strip=True) if el else 'YOK'} | ppg: {'VAR' if ppg else 'YOK'}")
          EOF
      - name: Fiyat elementlerini goster
        run: |
          python - << 'EOF'
          import requests, re
          from bs4 import BeautifulSoup

          url = "https://www.dogtas.com/piero-sandalye-kadife-dokulu-krem-3120012493"
          headers = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"}
          r = requests.get(url, headers=headers, timeout=20)
          print("HTTP Status:", r.status_code)
          soup = BeautifulSoup(r.text, "html.parser")

          # JSON-LD
          import json
          for script in soup.find_all("script", type="application/ld+json"):
              try:
                  data = json.loads(script.string or "")
                  if data.get("@type") == "Product":
                      print("JSON-LD price:", data.get("offers", {}).get("price"))
              except: pass

          # Tum fiyat elementleri
          selectors = [
              ".discount-price", ".new-sale-price", ".sale-price",
              ".discount-name", ".old-price", ".list-price",
              ".product-price-group", ".prices"
          ]
          for sel in selectors:
              for el in soup.select(sel)[:2]:
                  txt = el.get_text(strip=True)[:80]
                  print(f"{sel}: {txt!r}")

          # Sepette kelimesini ara
          for el in soup.find_all(string=re.compile("Sepette")):
              print("SEPETTE:", el.strip()[:60])

          # product-price-group tam HTML
          ppg = soup.select_one(".product-price-group")
          if ppg:
              print("PRODUCT-PRICE-GROUP HTML:", str(ppg)[:500])

          # Sepette indirim yuzdesini hesapla
          import re as _re
          ppg2 = soup.select_one(".product-price-group, .prices, .price-group")
          if ppg2:
              text = ppg2.get_text(" ", strip=True)
              m = _re.search(r"Sepette\s+%(\d+)\s*[İIiı]ndirim", text, _re.IGNORECASE)
              if m:
                  pct = int(m.group(1))
                  print(f"SEPETTE INDIRIM: %{pct}")
              else:
                  print("SEPETTE INDIRIM: BULUNAMADI")
                  print("PPG TEXT:", text[:200])

          # parse_prices sonucu
          import sys; sys.path.insert(0, ".")
          from scraper.dogtas import parse_prices as pp
          liste2, perakende2 = pp(soup)
          print(f"PARSE SONUCU: liste={liste2}, perakende={perakende2}")
          EOF
